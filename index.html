<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Tort House - Online Menu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        burgundy: '#70011C',
                        cream: '#FDF8F1',
                        chocolate: '#3D2B1F',
                        gold: '#D4AF37',
                        ivory: '#FFFDF9',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    borderRadius: {
                        'card': '16px',
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #FDF8F1; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Splash Screen Animation */
        #splash-screen {
            position: fixed;
            inset: 0;
            background-color: #70011C;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .splash-logo {
            width: 180px;
            height: 180px;
            animation: splashIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        .splash-text {
            color: #FDF8F1;
            margin-top: 1.5rem;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.25rem;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0.4s forwards;
        }

        @keyframes splashIn {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Product Card Constraints */
        .product-card {
            background: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .product-image-container {
            position: relative;
            width: 100%;
            padding-top: 60%; /* 16:10 approx */
            overflow: hidden;
            border-radius: 16px;
        }

        .product-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .category-chip.active {
            background-color: #70011C;
            color: white;
        }

        [v-cloak] { display: none; }
        
        .hidden-content { opacity: 0; }
        .visible-content { opacity: 1; transition: opacity 0.5s ease-in; }
    </style>
</head>
<body class="font-sans antialiased text-chocolate">

    <!-- Splash Screen -->
    <div id="splash-screen">
        <img src="https://firebasestorage.googleapis.com/v0/b/tort-house.appspot.com/o/assets%2Flogo_white_bg_removed.png?alt=media" alt="Logo" class="splash-logo" id="logo-splash-img">
        <div class="splash-text">Mehr bilan!</div>
    </div>

    <!-- Main Menu -->
    <div id="main-content" class="hidden-content">
        
        <!-- Header -->
        <header class="bg-burgundy text-white pt-6 pb-12 px-4 text-center rounded-b-[40px] shadow-lg">
            <div class="max-w-[1100px] mx-auto">
                <img src="https://firebasestorage.googleapis.com/v0/b/tort-house.appspot.com/o/assets%2Flogo_white_bg_removed.png?alt=media" alt="Tort House" class="w-24 h-24 mx-auto mb-4 bg-white rounded-full p-1 border-2 border-ivory shadow-xl">
                <h1 class="font-serif text-3xl font-bold italic tracking-tight">Tort House</h1>
                <p class="text-ivory/80 text-sm italic mt-1">Shirin lahzalar shu yerdan boshlanadi</p>
            </div>
        </header>

        <!-- Search & Filter Container -->
        <div class="max-w-[1100px] mx-auto px-4 -mt-8">
            <div class="bg-white rounded-2xl shadow-xl p-3 mb-6">
                <!-- Search Bar -->
                <div class="relative mb-4">
                    <input type="text" id="search-input" placeholder="Mahsulot qidirish..." 
                        class="w-full pl-10 pr-4 py-3 bg-cream rounded-xl outline-none focus:ring-2 focus:ring-burgundy/20 transition-all font-medium text-sm">
                    <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <!-- Categories -->
                <div id="category-list" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                    <button class="category-chip active flex-shrink-0 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider bg-cream hover:bg-gray-100 transition-colors" data-category="Barchasi">Barchasi</button>
                    <!-- Categories will be injected here -->
                </div>
            </div>

            <!-- Product Grid -->
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-20 animate-fade-in">
                <!-- Skeleton Loading -->
                <div class="skeleton-card bg-white p-4 rounded-card animate-pulse h-48"></div>
                <div class="skeleton-card bg-white p-4 rounded-card animate-pulse h-48 md:block hidden"></div>
                <div class="skeleton-card bg-white p-4 rounded-card animate-pulse h-48 lg:block hidden"></div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden text-center py-20">
                <div class="text-6xl mb-4">🍰</div>
                <h3 class="font-serif text-xl font-bold">Mahsulot topilmadi</h3>
                <p class="text-gray-400 text-sm">Boshqa kategoriya yoki qidiruvni sinab ko'ring</p>
            </div>
        </div>

        <!-- Footer Footer (Simple Credit) -->
        <footer class="py-10 text-center text-gray-400 text-xs italic">
            &copy; 2024 Tort House. Mehr bilan tayyorlangan.
        </footer>
    </div>

    <!-- Firebase SDK Modular -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
            authDomain: "tort-house.firebaseapp.com",
            projectId: "tort-house",
            storageBucket: "tort-house.firebasestorage.app",
            messagingSenderId: "531646484923",
            appId: "1:531646484923:web:e40a50fabf50519d9ab49e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let allProducts = [];
        let activeCategory = 'Barchasi';
        let searchQuery = '';

        // DOM Elements
        const grid = document.getElementById('product-grid');
        const emptyState = document.getElementById('empty-state');
        const categoryList = document.getElementById('category-list');
        const searchInput = document.getElementById('search-input');
        const splash = document.getElementById('splash-screen');
        const mainContent = document.getElementById('main-content');

        // Initial 1s Splash logic
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.classList.add('hidden');
                    mainContent.classList.remove('hidden-content');
                    mainContent.classList.add('visible-content');
                }, 500);
            }, 1000);
        });

        // Initialize Menu
        const productsRef = collection(db, "products");
        const q = query(productsRef, where("available", "==", true));

        onSnapshot(q, (snapshot) => {
            allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderCategories();
            renderProducts();
        });

        function renderCategories() {
            const categories = ['Barchasi', ...new Set(allProducts.map(p => p.category))];
            categoryList.innerHTML = categories.map(cat => `
                <button class="category-chip flex-shrink-0 px-5 py-2 rounded-full text-xs font-bold uppercase tracking-wider ${cat === activeCategory ? 'active' : 'bg-cream'} hover:bg-gray-100 transition-colors" data-category="${cat}">${cat}</button>
            `).join('');

            document.querySelectorAll('.category-chip').forEach(btn => {
                btn.onclick = () => {
                    activeCategory = btn.dataset.category;
                    renderCategories();
                    renderProducts();
                };
            });
        }

        function renderProducts() {
            const filtered = allProducts.filter(p => {
                const matchesCat = activeCategory === 'Barchasi' || p.category === activeCategory;
                const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     p.description.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                grid.innerHTML = filtered.map(p => `
                    <div class="product-card rounded-card overflow-hidden shadow-sm hover:shadow-lg flex flex-col">
                        <div class="p-3">
                            <div class="product-image-container">
                                <img src="${p.image || 'https://via.placeholder.com/400x250?text=Tort+House'}" alt="${p.name}" class="product-image" loading="lazy">
                            </div>
                        </div>
                        <div class="px-5 pb-5 pt-0">
                            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-[2px] mb-1">${p.category}</div>
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <h3 class="font-serif font-bold text-lg leading-tight">${p.name}</h3>
                                <div class="text-burgundy font-black whitespace-nowrap text-right">
                                    ${Number(p.price).toLocaleString()} <span class="text-[10px] font-bold">so‘m</span>
                                </div>
                            </div>
                            <p class="text-gray-500 text-xs line-clamp-2 italic font-light">${p.description || ''}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Search listener
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderProducts();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tort House Menu</title>

  <style>
    :root {
      --burgundy: #76001f;
      --burgundy-2: #4b0014;
      --cream: #fff7ec;
      --cream-2: #f7eadc;
      --card: #fffdf9;
      --text: #2d1810;
      --muted: #8d7568;
      --gold: #c7a24a;
      --line: rgba(118, 0, 31, .12);
      --shadow: 0 18px 45px rgba(54, 24, 13, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(199,162,74,.18), transparent 32%),
        linear-gradient(180deg, #fffaf3, var(--cream));
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: radial-gradient(circle, #9a1033 0%, var(--burgundy-2) 70%);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .25s ease;
    }

    .splash-box {
      text-align: center;
      animation: splashZoom .45s ease both;
    }

    .splash-box img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      filter: drop-shadow(0 18px 25px rgba(0,0,0,.25));
    }

    .splash-box p {
      color: #fff6e8;
      font-size: 21px;
      margin: 8px 0 0;
      font-family: Georgia, serif;
      font-style: italic;
    }

    @keyframes splashZoom {
      from { opacity: 0; transform: scale(.88) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .app {
      opacity: 0;
      transition: opacity .28s ease;
    }

    .app.show { opacity: 1; }

    .hero {
      min-height: 250px;
      background:
        linear-gradient(135deg, rgba(118,0,31,.94), rgba(75,0,20,.96)),
        url("https://images.unsplash.com/photo-1488477181946-6428a0291777?q=80&w=1600") center/cover;
      color: white;
      border-bottom-left-radius: 36px;
      border-bottom-right-radius: 36px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -120px auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(199,162,74,.18);
      filter: blur(3px);
    }

    .hero-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 18px 78px;
      position: relative;
      z-index: 1;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand img {
      width: 66px;
      height: 66px;
      object-fit: contain;
      background: rgba(255,255,255,.95);
      border-radius: 18px;
      padding: 4px;
      box-shadow: 0 14px 30px rgba(0,0,0,.18);
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 32px;
      letter-spacing: .4px;
    }

    .brand p {
      margin: 4px 0 0;
      color: rgba(255,255,255,.76);
      font-size: 13px;
    }

    .badge {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(12px);
      padding: 10px 15px;
      border-radius: 999px;
      font-size: 13px;
      color: #fff4e7;
    }

    .headline {
      margin-top: 42px;
      max-width: 620px;
    }

    .headline h2 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: clamp(34px, 5vw, 62px);
      line-height: .98;
    }

    .headline p {
      margin: 14px 0 0;
      max-width: 480px;
      color: rgba(255,255,255,.76);
      font-size: 16px;
      line-height: 1.6;
    }

    .panel {
      max-width: 1180px;
      margin: -48px auto 0;
      padding: 0 18px;
      position: relative;
      z-index: 5;
    }

    .glass {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow);
      border-radius: 26px;
      padding: 16px;
    }

    .search {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px 15px;
    }

    .search span {
      color: var(--burgundy);
      font-size: 18px;
    }

    .search input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      background: transparent;
      color: var(--text);
    }

    .chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 2px 2px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar { display: none; }

    .chip {
      position: relative;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 11px 18px;
      font-weight: 800;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
      transition: transform .22s ease, box-shadow .22s ease, background .22s ease, color .22s ease;
    }

    .chip:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(118,0,31,.10);
    }

    .chip.active {
      background: var(--burgundy);
      color: white;
      border-color: var(--burgundy);
      box-shadow: 0 12px 25px rgba(118,0,31,.22);
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .section-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-title h3 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 30px;
      color: var(--burgundy-2);
    }

    .section-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(118,0,31,.10);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(54, 24, 13, .06);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      position: relative;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 55px rgba(54, 24, 13, .13);
      border-color: rgba(118,0,31,.22);
    }

    .img-wrap {
      position: relative;
      height: 185px;
      overflow: hidden;
      background: var(--cream-2);
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .45s ease;
      display: block;
    }

    .card:hover .img-wrap img {
      transform: scale(1.06);
    }

    .category {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(255,255,255,.86);
      backdrop-filter: blur(10px);
      color: var(--burgundy);
      font-weight: 900;
      font-size: 11px;
      letter-spacing: .9px;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 8px 11px;
    }

    .content {
      padding: 16px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .row h4 {
      margin: 0;
      font-family: Georgia, serif;
      font-size: 22px;
      line-height: 1.12;
      color: var(--text);
    }

    .price {
      color: var(--burgundy);
      background: rgba(118,0,31,.07);
      padding: 8px 10px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 950;
      white-space: nowrap;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .status {
      text-align: center;
      padding: 55px 0;
      color: var(--muted);
      font-size: 16px;
    }

    .skeleton {
      background: linear-gradient(90deg, #fff, #f3e6da, #fff);
      background-size: 200% 100%;
      animation: shimmer 1s infinite linear;
      min-height: 280px;
      border-radius: 24px;
    }

    @keyframes shimmer {
      to { background-position: -200% 0; }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .badge { display: none; }
    }

    @media (max-width: 560px) {
      .hero { min-height: 230px; border-bottom-left-radius: 28px; border-bottom-right-radius: 28px; }
      .hero-inner { padding: 16px 14px 68px; }
      .brand img { width: 58px; height: 58px; border-radius: 16px; }
      .brand h1 { font-size: 26px; }
      .headline { margin-top: 32px; }
      .headline h2 { font-size: 34px; }
      .headline p { font-size: 14px; }
      .glass { border-radius: 22px; padding: 13px; }
      .container { padding-top: 24px; }
      .section-title { align-items: flex-start; flex-direction: column; gap: 4px; }
      .section-title h3 { font-size: 27px; }
      .grid { grid-template-columns: 1fr; gap: 16px; }
      .img-wrap { height: 178px; }
      .card { border-radius: 22px; }
      .row h4 { font-size: 21px; }
      .splash-box img { width: 130px; height: 130px; }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="splash-box">
      <img src="logo.png" alt="Tort House Logo">
      <p>Mehr bilan!</p>
    </div>
  </div>

  <div id="app" class="app">
    <section class="hero">
      <div class="hero-inner">
        <div class="nav">
          <div class="brand">
            <img src="logo.png" alt="Tort House Logo">
            <div>
              <h1>Tort House</h1>
              <p>Shirinliklar showroom menyusi</p>
            </div>
          </div>
          <div class="badge">QR Online Menu</div>
        </div>

        <div class="headline">
          <h2>Shirin lahzalar shu yerdan boshlanadi</h2>
          <p>Mahsulotlarni ko‘ring, narxlar bilan tanishing va kassirga kerakli shirinlik nomini ayting.</p>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="glass">
        <div class="search">
          <span>⌕</span>
          <input id="searchInput" type="text" placeholder="Tort, pirojniy yoki ichimlik qidirish..." />
        </div>
        <div id="categories" class="chips"></div>
      </div>
    </section>

    <main class="container">
      <div class="section-title">
        <h3>Menu</h3>
        <p>Bugungi mavjud mahsulotlar</p>
      </div>

      <div id="status" class="status">Menu yuklanmoqda...</div>

      <div id="grid" class="grid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
      authDomain: "tort-house.firebaseapp.com",
      projectId: "tort-house",
      storageBucket: "tort-house.firebasestorage.app",
      messagingSenderId: "531646484923",
      appId: "1:531646484923:web:e40a50fabf50519d9ab49e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const splash = document.getElementById("splash");
    const appDiv = document.getElementById("app");
    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const categoriesDiv = document.getElementById("categories");

    let products = [];
    let activeCategory = "Hammasi";

    setTimeout(() => {
      splash.style.opacity = "0";
      setTimeout(() => {
        splash.style.display = "none";
        appDiv.classList.add("show");
      }, 250);
    }, 500);

    const q = query(collection(db, "products"), where("available", "==", true));

    onSnapshot(q, (snapshot) => {
      products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderCategories();
      renderProducts();
    }, (error) => {
      grid.innerHTML = "";
      status.style.display = "block";
      status.textContent = "Xatolik: " + error.message;
    });

    function renderCategories() {
      const cats = ["Hammasi", ...new Set(products.map(p => p.category).filter(Boolean))];

      categoriesDiv.innerHTML = cats.map(cat => `
        <button class="chip ${cat === activeCategory ? "active" : ""}" data-category="${cat}">
          ${cat}
        </button>
      `).join("");

      document.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.category;
          renderCategories();
          renderProducts();
        });
      });
    }

    function renderProducts() {
      const search = searchInput.value.toLowerCase().trim();

      const filtered = products.filter(p => {
        const name = (p.name || "").toLowerCase();
        const desc = (p.description || "").toLowerCase();
        const cat = (p.category || "").toLowerCase();

        const matchSearch = name.includes(search) || desc.includes(search) || cat.includes(search);
        const matchCat = activeCategory === "Hammasi" || p.category === activeCategory;

        return matchSearch && matchCat;
      });

      if (!filtered.length) {
        grid.innerHTML = "";
        status.style.display = "block";
        status.textContent = "Mahsulot topilmadi";
        return;
      }

      status.style.display = "none";

      grid.innerHTML = filtered.map(p => `
        <article class="card">
          <div class="img-wrap">
            <img src="${p.image || "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=900"}" alt="${p.name || "Mahsulot"}" loading="lazy">
            <div class="category">${p.category || "Shirinlik"}</div>
          </div>
          <div class="content">
            <div class="row">
              <h4>${p.name || "Nomsiz mahsulot"}</h4>
              <div class="price">${Number(p.price || 0).toLocaleString()} s.</div>
            </div>
            <p class="desc">${p.description || ""}</p>
          </div>
        </article>
      `).join("");
    }

    searchInput.addEventListener("input", renderProducts);
  </script>
</body>
</html>

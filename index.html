<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Tort House Menu</title>
</head>
<body>
  <h1>Tort House Menu</h1>
  <div id="menu">Yuklanmoqda...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
      authDomain: "tort-house.firebaseapp.com",
      projectId: "tort-house",
      storageBucket: "tort-house.firebasestorage.app",
      messagingSenderId: "531646484923",
      appId: "1:531646484923:web:e40a50fabf50519d9ab49e",
      measurementId: "G-X8QXT821B1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const menuDiv = document.getElementById("menu");

    async function loadProducts() {
      try {
        const querySnapshot = await getDocs(collection(db, "products"));

        if (querySnapshot.empty) {
          menuDiv.innerHTML = "Mahsulot topilmadi";
          return;
        }

        menuDiv.innerHTML = "";

        querySnapshot.forEach((doc) => {
          const data = doc.data();

          menuDiv.innerHTML += `
            <div style="border:1px solid #ddd; padding:15px; margin:15px; border-radius:10px;">
              <h2>${data.name}</h2>
              <img src="${data.image}" style="width:200px; max-width:100%; border-radius:10px;" />
              <p>${data.description}</p>
              <h3>${data.price} so'm</h3>
              <p>Kategoriya: ${data.category}</p>
            </div>
          `;
        });
      } catch (error) {
        menuDiv.innerHTML = "Xatolik: " + error.message;
        console.error(error);
      }
    }

    loadProducts();
  </script>
</body>
</html>

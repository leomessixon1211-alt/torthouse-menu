<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tort House Menu</title>

  <style>
    :root {
      --burgundy: #74001c;
      --burgundy-dark: #4b0012;
      --cream: #fff8ef;
      --card: #ffffff;
      --beige: #f3e7dc;
      --text: #2f1d15;
      --muted: #8b7b72;
      --gold: #c9a24a;
      --border: #eadfd5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    #splash {
      position: fixed;
      inset: 0;
      background: var(--burgundy);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: opacity .25s ease;
    }

    .splash-content {
      text-align: center;
      animation: zoomIn .45s ease;
    }

    .splash-content img {
      width: 150px;
      height: 150px;
      object-fit: contain;
      border-radius: 50%;
    }

    .splash-content p {
      color: #fff7ed;
      margin: 10px 0 0;
      font-size: 20px;
      font-style: italic;
      letter-spacing: .5px;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(.92); }
      to { opacity: 1; transform: scale(1); }
    }

    .app {
      opacity: 0;
      transition: opacity .25s ease;
    }

    .app.show {
      opacity: 1;
    }

    header {
      background: linear-gradient(135deg, var(--burgundy), var(--burgundy-dark));
      color: white;
      padding: 18px 16px 26px;
      border-bottom-left-radius: 26px;
      border-bottom-right-radius: 26px;
      box-shadow: 0 12px 30px rgba(116, 0, 28, .22);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: contain;
      background: white;
    }

    .brand h1 {
      margin: 0;
      font-size: 25px;
      letter-spacing: .3px;
    }

    .brand p {
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255,255,255,.78);
    }

    .controls {
      max-width: 1100px;
      margin: -16px auto 0;
      padding: 0 16px;
      position: relative;
      z-index: 2;
    }

    .search-box {
      background: white;
      border: 1px solid var(--border);
      box-shadow: 0 10px 28px rgba(47, 29, 21, .08);
      border-radius: 16px;
      padding: 12px 14px;
    }

    .search-box input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      color: var(--text);
      background: transparent;
    }

    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 14px 0 4px;
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar {
      display: none;
    }

    .chip {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      cursor: pointer;
    }

    .chip.active {
      background: var(--burgundy);
      color: white;
      border-color: var(--burgundy);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 16px 40px;
    }

    .status {
      text-align: center;
      color: var(--muted);
      padding: 38px 0;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(47, 29, 21, .06);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(47, 29, 21, .1);
    }

    .card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-radius: 14px;
      background: var(--beige);
      display: block;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-top: 12px;
    }

    .card h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      color: var(--text);
    }

    .price {
      color: var(--burgundy);
      font-size: 18px;
      font-weight: 900;
      white-space: nowrap;
    }

    .category {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 850px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card img {
        height: 155px;
      }
    }

    @media (max-width: 560px) {
      header {
        padding: 16px 14px 24px;
      }

      .brand h1 {
        font-size: 23px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card {
        border-radius: 16px;
      }

      .card img {
        height: 185px;
      }

      .card h2 {
        font-size: 18px;
      }

      .price {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <div id="splash">
    <div class="splash-content">
      <img src="logo.png" alt="Tort House Logo">
      <p>Mehr bilan!</p>
    </div>
  </div>

  <div id="app" class="app">
    <header>
      <div class="header-inner">
        <img class="logo" src="logo.png" alt="Tort House Logo">
        <div class="brand">
          <h1>Tort House</h1>
          <p>Shirin lahzalar shu yerdan boshlanadi</p>
        </div>
      </div>
    </header>

    <section class="controls">
      <div class="search-box">
        <input id="searchInput" type="text" placeholder="Mahsulot qidirish..." />
      </div>
      <div id="categories" class="categories"></div>
    </section>

    <main class="container">
      <div id="status" class="status">Menu yuklanmoqda...</div>
      <div id="grid" class="grid"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
      authDomain: "tort-house.firebaseapp.com",
      projectId: "tort-house",
      storageBucket: "tort-house.firebasestorage.app",
      messagingSenderId: "531646484923",
      appId: "1:531646484923:web:e40a50fabf50519d9ab49e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const splash = document.getElementById("splash");
    const appDiv = document.getElementById("app");
    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const searchInput = document.getElementById("searchInput");
    const categoriesDiv = document.getElementById("categories");

    let products = [];
    let activeCategory = "Hammasi";

    setTimeout(() => {
      splash.style.opacity = "0";
      setTimeout(() => {
        splash.style.display = "none";
        appDiv.classList.add("show");
      }, 250);
    }, 500);

    const q = query(collection(db, "products"), where("available", "==", true));

    onSnapshot(q, (snapshot) => {
      products = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderCategories();
      renderProducts();
    }, (error) => {
      status.textContent = "Xatolik: " + error.message;
    });

    function renderCategories() {
      const cats = ["Hammasi", ...new Set(products.map(p => p.category).filter(Boolean))];

      categoriesDiv.innerHTML = cats.map(cat => `
        <button class="chip ${cat === activeCategory ? "active" : ""}" data-category="${cat}">
          ${cat}
        </button>
      `).join("");

      document.querySelectorAll(".chip").forEach(btn => {
        btn.addEventListener("click", () => {
          activeCategory = btn.dataset.category;
          renderCategories();
          renderProducts();
        });
      });
    }

    function renderProducts() {
      const search = searchInput.value.toLowerCase().trim();

      const filtered = products.filter(p => {
        const name = (p.name || "").toLowerCase();
        const desc = (p.description || "").toLowerCase();
        const cat = (p.category || "").toLowerCase();

        const matchSearch = name.includes(search) || desc.includes(search) || cat.includes(search);
        const matchCat = activeCategory === "Hammasi" || p.category === activeCategory;

        return matchSearch && matchCat;
      });

      if (!filtered.length) {
        grid.innerHTML = "";
        status.style.display = "block";
        status.textContent = "Mahsulot topilmadi";
        return;
      }

      status.style.display = "none";

      grid.innerHTML = filtered.map(p => `
        <article class="card">
          <img src="${p.image || "https://images.unsplash.com/photo-1578985545062-69928b1d9587?q=80&w=900"}" alt="${p.name || "Mahsulot"}" loading="lazy">
          <div class="card-top">
            <h2>${p.name || "Nomsiz mahsulot"}</h2>
            <div class="price">${Number(p.price || 0).toLocaleString()} s.</div>
          </div>
          <div class="category">${p.category || "Shirinlik"}</div>
          <p class="desc">${p.description || ""}</p>
        </article>
      `).join("");
    }

    searchInput.addEventListener("input", renderProducts);
  </script>
</body>
</html>

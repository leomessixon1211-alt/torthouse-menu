<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tort House Menu</title>

<style>
:root{
--burgundy:#76001f;
--cream:#fff7ec;
--card:#fffdf9;
--text:#2d1810;
--muted:#8d7568;
--gold:#c7a24a;
--line:rgba(118,0,31,.12);
}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--cream);
color:var(--text);
}

/* splash */
#splash{
position:fixed;
inset:0;
background:var(--burgundy);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
transition:.3s;
}

.splash-box{text-align:center;}
.splash-box img{width:120px;}
.splash-box p{color:#fff;margin-top:8px;}

.app{opacity:0;transition:.3s;}
.app.show{opacity:1;}

/* header */
header{
background:var(--burgundy);
color:white;
padding:20px;
border-radius:0 0 30px 30px;
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
padding:16px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{transform:translateY(-4px);}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{padding:12px;}

.price{color:var(--burgundy);font-weight:900;}

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
.grid{grid-template-columns:1fr;}
}

/* FEEDBACK */
.feedback{
margin:20px;
padding:20px;
background:white;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.rating button{
font-size:26px;
border:none;
background:none;
cursor:pointer;
opacity:.4;
}

.rating button.active{opacity:1;}

.quick button{
margin:5px;
padding:8px 12px;
border-radius:12px;
border:1px solid #ddd;
background:#fafafa;
cursor:pointer;
}

textarea{
width:100%;
margin-top:10px;
padding:10px;
border-radius:12px;
border:1px solid #ddd;
}

.send{
margin-top:10px;
width:100%;
padding:12px;
background:var(--burgundy);
color:white;
border:none;
border-radius:14px;
}

</style>
</head>

<body>

<div id="splash">
<div class="splash-box">
<img src="logo.png">
<p>Mehr bilan!</p>
</div>
</div>

<div id="app" class="app">

<header>
<h2>Tort House</h2>
<p>Shirin lahzalar shu yerdan boshlanadi</p>
</header>

<div id="grid" class="grid"></div>

<!-- FEEDBACK -->
<div class="feedback">
<h3>Xizmatimizni baholang</h3>

<div class="rating" id="rating">
<button data="1">🍰</button>
<button data="2">🍰</button>
<button data="3">🍰</button>
<button data="4">🍰</button>
<button data="5">🍰</button>
</div>

<div class="quick">
<button data="Mazali">Mazali</button>
<button data="Yaxshi xizmat">Xizmat yaxshi</button>
<button data="Tez xizmat">Tez xizmat</button>
<button data="Narx yaxshi">Narx yaxshi</button>
<button data="Yana kelaman">Yana kelaman</button>
</div>

<textarea id="comment" placeholder="Fikringizni yozing..."></textarea>

<button class="send" onclick="sendReview()">Yuborish</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCsx23vnQ4jvGv0reltApc4fEvhF9VHKIU",
authDomain:"tort-house.firebaseapp.com",
projectId:"tort-house",
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let rating=0;
let quick="";

document.querySelectorAll(".rating button").forEach(b=>{
b.onclick=()=>{
rating=b.dataset;
document.querySelectorAll(".rating button").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
};
});

document.querySelectorAll(".quick button").forEach(b=>{
b.onclick=()=>{
quick=b.dataset;
};
});

window.sendReview=async()=>{
await addDoc(collection(db,"reviews"),{
rating:Number(rating),
quick,
comment:document.getElementById("comment").value,
createdAt:serverTimestamp()
});
alert("Rahmat!");
};

onSnapshot(collection(db,"products"),snap=>{
const grid=document.getElementById("grid");
grid.innerHTML="";
snap.forEach(doc=>{
const d=doc.data();
if(d.available!==false){
grid.innerHTML+=`
<div class="card">
<img src="${d.image}">
<div class="card-body">
<h4>${d.name}</h4>
<div class="price">${d.price} so'm</div>
</div>
</div>`;
}
});
});

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").classList.add("show");
},500);
</script>

</body>
</html>
